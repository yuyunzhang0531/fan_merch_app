<!DOCTYPE html>
<html>
<head>
    <title>API终极测试</title>
</head>
<body>
    <h2>通义万相API测试</h2>
    <button onclick="testAPI()" style="padding:10px 20px;font-size:16px;">点我测试</button>
    <div id="result" style="margin-top:20px;padding:10px;background:#f5f5f5;"></div>

    <script>
    async function testAPI() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '请求中...';
        
        // 用JSONP方式绕过CORS（最稳）
        const API_KEY = 'sk-156db82e98ad4a6a894f7cb49a6f2e7b';  // 改成你的！
        
        // 创建一个script标签来发请求（JSONP方式）
        const script = document.createElement('script');
        const callbackName = 'jsonp_callback_' + Date.now();
        
        window[callbackName] = function(data) {
            resultDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            document.body.removeChild(script);
            delete window[callbackName];
        };
        
        // 构造请求数据
        const requestData = {
            model: 'wan2.6-t2i',
            input: {
                messages: [
                    {
                        role: 'user',
                        content: [{ text: '一只可爱的猫' }]
                    }
                ]
            },
            parameters: {
                size: '1024*1024',
                n: 1
            }
        };
        
        // 把数据转成base64，避免特殊字符问题
        const base64Data = btoa(JSON.stringify(requestData));
        
        script.src = `https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation?callback=${callbackName}&data=${base64Data}`;
        script.onerror = function() {
            resultDiv.innerHTML = '请求失败，继续用方案二';
            document.body.removeChild(script);
        };
        
        document.body.appendChild(script);
        
        // 5秒超时
        setTimeout(() => {
            if (window[callbackName]) {
                resultDiv.innerHTML = '请求超时';
                delete window[callbackName];
            }
        }, 5000);
    }
    </script>
</body>
</html>
